```html
<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 сынып Информатика тесті</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fa;
font-family:Arial,sans-serif;
}

.card{
margin-bottom:15px;
border:none;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="container mt-5">

<h1 class="text-center mb-4">
💻 5 сынып Информатика тесті
</h1>

<div class="card p-4">

<p><b>1. Компьютердің миы?</b></p>

<input type="radio" name="q1" value="1">
Процессор

<br>

<input type="radio" name="q1" value="0">
Монитор

</div>

<div class="card p-4">

<p><b>2. Scratch дегеніміз?</b></p>

<input type="radio" name="q2" value="1">
Бағдарламалау ортасы

<br>

<input type="radio" name="q2" value="0">
Антивирус

</div>

<div class="card p-4">

<p><b>3. Ақпараттың ең кіші өлшем бірлігі?</b></p>

<input type="radio" name="q3" value="1">
Бит

<br>

<input type="radio" name="q3" value="0">
Байт

</div>

<div class="card p-4">

<p><b>4. Интернет браузері?</b></p>

<input type="radio" name="q4" value="1">
Google Chrome

<br>

<input type="radio" name="q4" value="0">
Paint

</div>

<div class="card p-4">

<p><b>5. Файлды сақтау командасы?</b></p>

<input type="radio" name="q5" value="1">
Save

<br>

<input type="radio" name="q5" value="0">
Delete

</div>

<div class="text-center mt-4">

<button
class="btn btn-success btn-lg"
onclick="checkQuiz()">

Тестті аяқтау

</button>

</div>

<h2
class="text-center mt-4"
id="result">
</h2>

</div>

<script>

function checkQuiz(){

let score = 0;

for(let i=1;i<=5;i++){

let answer =
document.querySelector('input[name="q'+i+'"]:checked');

if(answer){
score += Number(answer.value);
}

}

let percent = score * 20;

document.getElementById("result").innerHTML =
"Нәтиже: " + score + "/5 (" + percent + "%)";

}

</script>

</body>
</html>
