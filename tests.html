```html
<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Онлайн тест</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
    font-family:Arial;
}

.container{
    max-width:900px;
    margin-top:40px;
}

.card{
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h1 class="text-center mb-4">📝 Онлайн тесттер</h1>

<div class="card p-4">

<h3>🔢 Математика</h3>

<p>1. 2 + 2 = ?</p>

<input type="radio" name="q1" value="3"> 3<br>
<input type="radio" name="q1" value="4"> 4<br>
<input type="radio" name="q1" value="5"> 5<br>

</div>

<div class="card p-4">

<h3>💻 Информатика</h3>

<p>2. Python бағдарламалау тілі ме?</p>

<input type="radio" name="q2" value="yes"> Иә<br>
<input type="radio" name="q2" value="no"> Жоқ<br>

</div>

<div class="card p-4">

<h3>⚛️ Физика</h3>

<p>3. Күштің формуласы?</p>

<input type="radio" name="q3" value="F=ma"> F = ma<br>
<input type="radio" name="q3" value="E=mc2"> E = mc²<br>
<input type="radio" name="q3" value="P=UI"> P = UI<br>

</div>

<div class="text-center">

<button class="btn btn-success btn-lg"
onclick="checkTest()">

Тестті тексеру

</button>

</div>

<div class="text-center mt-4">

<h2 id="result"></h2>

</div>

</div>

<script>

function checkTest(){

let score = 0;

if(document.querySelector('input[name="q1"]:checked')?.value=="4")
score++;

if(document.querySelector('input[name="q2"]:checked')?.value=="yes")
score++;

if(document.querySelector('input[name="q3"]:checked')?.value=="F=ma")
score++;

document.getElementById("result").innerHTML =
"Сіздің нәтижеңіз: " + score + " / 3";

}

</script>

</body>
</html>
```
